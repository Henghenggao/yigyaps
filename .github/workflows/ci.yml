name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: yigyaps_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run test:ci
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/yigyaps_test
          TEST_DATABASE_URL: postgresql://postgres:password@localhost:5432/yigyaps_test
          KMS_KEK: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          SESSION_SECRET: test_ci_session_secret_1234567890
          JWT_SECRET: test_ci_jwt_secret_12345678901234567890

  docker-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Build and verify Dockerfile
        run: docker build -t yigyaps-api .

  compose-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Build and start release-like stack
        run: docker compose up -d --build postgres api web
        env:
          GITHUB_CLIENT_ID: test-github-client-id
          GITHUB_CLIENT_SECRET: test-github-client-secret
      - name: Verify API and web endpoints
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:3100/v1/health; then
              break
            fi
            if [ "$i" -eq 30 ]; then
              docker compose logs api
              exit 1
            fi
            sleep 2
          done

          curl -fsS http://127.0.0.1:5173/health
          curl -fsS http://127.0.0.1:5173/ | grep -q "<!doctype html>"
      - name: Show compose logs on failure
        if: failure()
        run: docker compose logs
      - name: Stop compose stack
        if: always()
        run: docker compose down -v

  release-gate:
    name: Release gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs:
      - lint-and-typecheck
      - test
      - docker-build
      - compose-smoke
    if: always()
    steps:
      - name: Check required jobs
        run: |
          if [ "${{ needs.lint-and-typecheck.result }}" != "success" ]; then
            echo "lint-and-typecheck failed with result: ${{ needs.lint-and-typecheck.result }}"
            exit 1
          fi

          if [ "${{ needs.test.result }}" != "success" ]; then
            echo "test failed with result: ${{ needs.test.result }}"
            exit 1
          fi

          if [ "${{ needs.docker-build.result }}" != "success" ]; then
            echo "docker-build failed with result: ${{ needs.docker-build.result }}"
            exit 1
          fi

          if [ "${{ needs.compose-smoke.result }}" != "success" ]; then
            echo "compose-smoke failed with result: ${{ needs.compose-smoke.result }}"
            exit 1
          fi

          echo "Release gate passed."
